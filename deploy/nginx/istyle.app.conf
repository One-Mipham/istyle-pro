# iStyle Pro — Tencent Cloud Lightweight Server Nginx Config
# Place at: /etc/nginx/sites-available/istyle.app
# Enable:   ln -s /etc/nginx/sites-available/istyle.app /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name istyle.app www.istyle.app;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name istyle.app www.istyle.app;

    # SSL — managed by certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/istyle.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/istyle.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=self, microphone=()" always;

    root /var/www/istyle.app;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # PWA static files
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-cache";
    }

    # Long cache for hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker — never cached
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Manifest — short cache
    location = /manifest.json {
        expires 1h;
        add_header Cache-Control "public";
    }

    # API reverse proxy → Fastify (PM2 on port 3000)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # CORS for PWA (handled by Fastify too, belt-and-suspenders)
        add_header Access-Control-Allow-Origin "https://istyle.app" always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Desktop app downloads
    location /download/ {
        alias /var/www/istyle.app/downloads/;
        autoindex on;
        add_header Content-Disposition "attachment";

        # Allow CORS for download links from onemipham.com
        add_header Access-Control-Allow-Origin "*";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Deny access to sensitive files
    location ~ \.(env|sql|log|yml|yaml)$ {
        deny all;
        return 404;
    }
}
